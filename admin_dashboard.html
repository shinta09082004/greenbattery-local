<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EneMap AI — 管理ダッシュボード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a202c; color: #e2e8f0; min-height: 100vh; }

  header {
    background: #0d1117; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; border-bottom: 1px solid #2d3748; position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1rem; font-weight: 700; color: #48bb78; letter-spacing: 0.5px; }
  .logo span { color: #a0aec0; font-size: 0.75rem; font-weight: 400; margin-left: 8px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  #header-user { color: #a0aec0; font-size: 0.85rem; }
  .btn-logout { background: none; border: 1px solid #4a5568; color: #a0aec0; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  .btn-logout:hover { border-color: #718096; color: #e2e8f0; }

  .tabs { background: #171f2b; border-bottom: 1px solid #2d3748; display: flex; gap: 0; padding: 0 24px; }
  .tab { padding: 14px 20px; cursor: pointer; font-size: 0.88rem; color: #718096; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab:hover { color: #a0aec0; }
  .tab.active { color: #48bb78; border-bottom-color: #48bb78; font-weight: 600; }

  .content { padding: 20px 24px; }

  .filter-bar {
    background: #2d3748; border-radius: 8px; padding: 14px 16px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .filter-bar input, .filter-bar select {
    background: #1a202c; border: 1px solid #4a5568; color: #e2e8f0;
    padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; outline: none;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: #48bb78; }
  .filter-bar input { width: 220px; }
  .btn-search {
    background: #48bb78; color: white; border: none; padding: 7px 16px;
    border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
  }
  .btn-search:hover { background: #38a169; }
  .result-count { color: #718096; font-size: 0.82rem; margin-left: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead tr { background: #2d3748; }
  th { padding: 10px 14px; text-align: left; color: #a0aec0; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #4a5568; }
  td { padding: 10px 14px; border-bottom: 1px solid #2d3748; vertical-align: middle; }
  tr:hover td { background: #252f3f; }
  .table-wrap { background: #0d1117; border-radius: 8px; overflow: hidden; border: 1px solid #2d3748; }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
  .badge-success { background: #1c4532; color: #68d391; }
  .badge-fail { background: #4a1212; color: #fc8181; }
  .badge-sub { background: #1a365d; color: #63b3ed; }
  .badge-free { background: #2d3748; color: #a0aec0; }
  .badge-admin { background: #44337a; color: #b794f4; }

  .action-label { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; font-family: monospace; }
  .action-search_candidates { background: #1a365d; color: #63b3ed; }
  .action-fetch_registry { background: #1c4532; color: #68d391; }
  .action-layer_fude { background: #44337a; color: #b794f4; }
  .action-layer_agri_zone { background: #3d2800; color: #fbd38d; }

  .mono { font-family: monospace; font-size: 0.8rem; color: #718096; }
  .empty-state { text-align: center; color: #4a5568; padding: 60px 0; font-size: 0.9rem; }
  .loading { text-align: center; color: #718096; padding: 40px; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #0d1117; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; }
  .stat-label { color: #718096; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: #48bb78; margin-top: 4px; }

  #tab-login { display: block; }
  #tab-actions { display: none; }
  #tab-users { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">ENEMAP AI <span>管理ダッシュボード</span></div>
  <div class="header-right">
    <span id="header-user"></span>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
    <button class="btn-logout" onclick="window.location='/'">← メインアプリ</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('login', this)">🔐 ログイン履歴</div>
  <div class="tab" onclick="switchTab('actions', this)">📋 操作ログ</div>
  <div class="tab" onclick="switchTab('users', this)">👥 ユーザー一覧</div>
</div>

<div class="content">

  <!-- ログイン履歴タブ -->
  <div id="tab-login">
    <div class="filter-bar">
      <input type="text" id="login-email-filter" placeholder="メールで絞り込み" onkeydown="if(event.key==='Enter') loadLoginHistory()">
      <select id="login-result-filter">
        <option value="">すべて</option>
        <option value="1">成功のみ</option>
        <option value="0">失敗のみ</option>
      </select>
      <button class="btn-search" onclick="loadLoginHistory()">検索</button>
      <span class="result-count" id="login-count"></span>
    </div>
    <div class="table-wrap">
      <div id="login-table-body"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 操作ログタブ -->
  <div id="tab-actions">
    <div class="filter-bar">
      <input type="text" id="action-email-filter" placeholder="メールで絞り込み" onkeydown="if(event.key==='Enter') loadActionLogs()">
      <select id="action-type-filter">
        <option value="">すべての操作</option>
        <option value="search_candidates">候補地検索</option>
        <option value="fetch_registry">登記情報取得</option>
        <option value="layer_fude">農地（白地）レイヤー</option>
        <option value="layer_agri_zone">農振レイヤー</option>
      </select>
      <button class="btn-search" onclick="loadActionLogs()">検索</button>
      <span class="result-count" id="action-count"></span>
    </div>
    <div class="table-wrap">
      <div id="action-table-body"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- ユーザー一覧タブ -->
  <div id="tab-users">
    <div class="filter-bar">
      <button class="btn-search" onclick="loadUsers()">更新</button>
      <span class="result-count" id="users-count"></span>
    </div>
    <div class="stat-grid" id="users-stats"></div>
    <div class="table-wrap">
      <div id="users-table-body"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

</div>

<script>
  const TOKEN_KEY = 'gb_token';
  let authToken = localStorage.getItem(TOKEN_KEY);

  const ACTION_LABELS = {
    search_candidates: '候補地検索',
    fetch_registry: '登記情報取得',
    layer_fude: '農地（白地）',
    layer_agri_zone: '農振レイヤー',
  };

  async function init() {
    if (!authToken) { window.location.href = '/'; return; }
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (!res.ok) { window.location.href = '/'; return; }
      const user = await res.json();
      if (!user.is_admin) { window.location.href = '/'; return; }
      document.getElementById('header-user').textContent = user.email;
      loadLoginHistory();
    } catch (e) { window.location.href = '/'; }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem('gb_email');
    window.location.href = '/';
  }

  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-login').style.display = 'none';
    document.getElementById('tab-actions').style.display = 'none';
    document.getElementById('tab-users').style.display = 'none';
    document.getElementById('tab-' + name).style.display = 'block';
    if (name === 'login') loadLoginHistory();
    if (name === 'actions') loadActionLogs();
    if (name === 'users') loadUsers();
  }

  function fmtDate(s) {
    if (!s) return '-';
    return s.replace('T', ' ').slice(0, 19);
  }

  // --- ログイン履歴 ---
  async function loadLoginHistory() {
    const emailFilter = document.getElementById('login-email-filter').value.trim();
    const resultFilter = document.getElementById('login-result-filter').value;
    let url = '/api/admin/login-history-jwt?limit=300';
    if (emailFilter) url += `&email=${encodeURIComponent(emailFilter)}`;
    const body = document.getElementById('login-table-body');
    body.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (!res.ok) { body.innerHTML = '<div class="empty-state">取得に失敗しました</div>'; return; }
      let rows = await res.json();
      if (resultFilter !== '') rows = rows.filter(r => String(r.success) === resultFilter);
      document.getElementById('login-count').textContent = `${rows.length} 件`;
      if (rows.length === 0) { body.innerHTML = '<div class="empty-state">履歴がありません</div>'; return; }
      body.innerHTML = `<table>
        <thead><tr><th>日時</th><th>メールアドレス</th><th>結果</th><th>IPアドレス</th></tr></thead>
        <tbody>${rows.map(r => `
          <tr>
            <td class="mono">${fmtDate(r.logged_at)}</td>
            <td>${r.email}</td>
            <td>${r.success ? '<span class="badge badge-success">✓ 成功</span>' : '<span class="badge badge-fail">✗ 失敗</span>'}</td>
            <td class="mono">${r.ip_address || '-'}</td>
          </tr>`).join('')}
        </tbody></table>`;
    } catch (e) { body.innerHTML = '<div class="empty-state">通信エラー</div>'; }
  }

  // --- 操作ログ ---
  async function loadActionLogs() {
    const emailFilter = document.getElementById('action-email-filter').value.trim();
    const actionFilter = document.getElementById('action-type-filter').value;
    let url = '/api/admin/action-logs-jwt?limit=300';
    if (emailFilter) url += `&email=${encodeURIComponent(emailFilter)}`;
    if (actionFilter) url += `&action=${encodeURIComponent(actionFilter)}`;
    const body = document.getElementById('action-table-body');
    body.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (!res.ok) { body.innerHTML = '<div class="empty-state">取得に失敗しました</div>'; return; }
      const rows = await res.json();
      document.getElementById('action-count').textContent = `${rows.length} 件`;
      if (rows.length === 0) { body.innerHTML = '<div class="empty-state">操作ログがありません</div>'; return; }
      body.innerHTML = `<table>
        <thead><tr><th>日時</th><th>ユーザー</th><th>操作</th><th>詳細</th><th>IP</th></tr></thead>
        <tbody>${rows.map(r => {
          let details = '';
          try {
            const d = JSON.parse(r.details || '{}');
            details = Object.entries(d).filter(([,v]) => v !== null).map(([k,v]) => `${k}: ${v}`).join(' | ');
          } catch {}
          return `<tr>
            <td class="mono">${fmtDate(r.logged_at)}</td>
            <td>${r.user_email}</td>
            <td><span class="action-label action-${r.action}">${ACTION_LABELS[r.action] || r.action}</span></td>
            <td class="mono" style="font-size:0.78rem;color:#718096;">${details}</td>
            <td class="mono">${r.ip_address || '-'}</td>
          </tr>`;
        }).join('')}
        </tbody></table>`;
    } catch (e) { body.innerHTML = '<div class="empty-state">通信エラー</div>'; }
  }

  // --- ユーザー一覧 ---
  async function loadUsers() {
    const body = document.getElementById('users-table-body');
    const stats = document.getElementById('users-stats');
    body.innerHTML = '<div class="loading">読み込み中...</div>';
    try {
      const res = await fetch('/api/admin/users-jwt', { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (!res.ok) { body.innerHTML = '<div class="empty-state">取得に失敗しました</div>'; return; }
      const rows = await res.json();
      document.getElementById('users-count').textContent = `${rows.length} ユーザー`;
      const subs = rows.filter(r => r.is_subscribed).length;
      const admins = rows.filter(r => r.is_admin).length;
      stats.innerHTML = `
        <div class="stat-card"><div class="stat-label">総ユーザー</div><div class="stat-value">${rows.length}</div></div>
        <div class="stat-card"><div class="stat-label">有料会員</div><div class="stat-value" style="color:#63b3ed">${subs}</div></div>
        <div class="stat-card"><div class="stat-label">管理者</div><div class="stat-value" style="color:#b794f4">${admins}</div></div>
        <div class="stat-card"><div class="stat-label">無料会員</div><div class="stat-value" style="color:#a0aec0">${rows.length - subs}</div></div>
      `;
      body.innerHTML = `<table>
        <thead><tr><th>メールアドレス</th><th>プラン</th><th>権限</th><th>登録日</th></tr></thead>
        <tbody>${rows.map(r => `
          <tr>
            <td>${r.email}</td>
            <td>${r.is_subscribed ? '<span class="badge badge-sub">Pro</span>' : '<span class="badge badge-free">Free</span>'}</td>
            <td>${r.is_admin ? '<span class="badge badge-admin">管理者</span>' : ''}</td>
            <td class="mono">${fmtDate(r.created_at)}</td>
          </tr>`).join('')}
        </tbody></table>`;
    } catch (e) { body.innerHTML = '<div class="empty-state">通信エラー</div>'; }
  }

  init();
</script>
</body>
</html>
